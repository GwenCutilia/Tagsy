<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tagsy 设置</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

	<div id="app" class="flex min-h-screen">
		<!-- 侧边栏 -->
		<aside id="sidebar" class="sidebar fixed top-0 left-0 h-full w-64 bg-white shadow border-r z-40 flex flex-col">
			<div id="sidebar_header" class="text-center text-xl font-bold text-gray-800 py-5 border-b">Tagsy_V2.0.0</div>
			<ul id="sidebar_menu" class="flex flex-col mt-4 space-y-1 px-2">
				<li id="menu_overview">
					<a id="link_overview" href="Index.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-100 text-gray-700">
						<i class="fas fa-gauge mr-3 w-5 text-center"></i>概览
					</a>
				</li>
				<li id="menu_w2">
					<a id="link_w2" href="W2.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-100 text-gray-700">
						<i class="fas fa-server mr-3 w-5 text-center"></i>万维平台
					</a>
				</li>
				<li id="menu_qlabel">
					<a id="link_qlabel" href="QLabel.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-100 text-gray-700">
						<i class="fas fa-tags mr-3 w-5 text-center"></i>QLabel标注
					</a>
				</li>
				<li id="menu_ls">
					<a id="link_ls" href="LS.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-100 text-gray-700">
						<i class="fas fa-file-alt mr-3 w-5 text-center"></i>凌波微步日报
					</a>
				</li>
				<li id="menu_wecom">
					<a id="link_wecom" href="WeCom.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-100 text-gray-700">
						<i class="fas fa-comments mr-3 w-5 text-center"></i>企业微信日报
					</a>
				</li>
				<li id="menu_setting">
					<a id="link_setting" href="Setting.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-100 text-blue-600 font-semibold bg-blue-100">
						<i class="fas fa-cog mr-3 w-5 text-center"></i>设置
					</a>
				</li>
			</ul>
			<div id="sidebar_footer" class="mt-auto px-4 py-4 border-t">
				<a id="link_logout" href="#" class="flex items-center px-4 py-2 text-sm rounded-md text-red-600 hover:bg-red-50">
					<i class="fas fa-sign-out-alt mr-2 w-5 text-center"></i>退出登录
				</a>
			</div>
		</aside>

		<!-- 主内容区域 -->
		<main class="flex-1 ml-64 p-6 space-y-6">
			<!-- 页面标题和操作按钮 -->
			<div id="page_header" class="flex items-center justify-between">
				<h1 id="page_title" class="text-2xl font-bold text-gray-800">系统设置</h1>
				<div id="header_actions" class="flex space-x-2">
					<button id="btn_save_settings" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center">
						<i class="fas fa-save mr-2"></i>保存设置
					</button>
					<button id="btn_reset_settings" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition flex items-center">
						<i class="fas fa-undo mr-2"></i>恢复默认
					</button>
				</div>
			</div>

			<!-- 设置内容区域 -->
			<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
				<!-- 左侧: 系统设置 -->
				<div class="space-y-6">
					<!-- 基本设置 -->
					<div class="bg-white shadow rounded-xl p-5">
						<h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center">
							<i class="fas fa-user mr-2 text-blue-500"></i>账号设置
						</h2>
						<div class="space-y-4">
							<!-- W2设置分组 -->
							<div class="p-5">
							<!-- 第一个板块: 万维平台(W2)账号设置 -->
								<div class="mb-6">
									<div class="flex items-center justify-between mb-3">
										<div class="flex items-center">
											<i class="fas fa-server text-blue-500 mr-2"></i>
											<h3 class="font-medium text-gray-700">万维平台(W2)账号设置</h3>
										</div>
										<div class="flex space-x-2">
											<button id="w2_user_test_account_setting_button" class="px-3.5 py-1.5 rounded-lg bg-green-500 text-white hover:bg-green-600 transition flex items-center text-sm">
												<i class="fas fa-play mr-1.5 text-xs"></i>测试W2连通性
											</button>
										</div>
									</div>
									<div class="space-y-4">
										<div>
											<label for="w2_user_name_account_setting_input" class="block text-sm text-gray-600 mb-1">用户名</label>
											<input type="text" id="w2_user_name_account_setting_input" placeholder="lingboweibu(beijing)kejiyouxiangongsi_" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
										</div>
										<div>
											<label for="w2_user_password_account_setting_input" class="block text-sm text-gray-600 mb-1">密码</label>
											<input type="password" id="w2_user_password_account_setting_input" placeholder="输入W2密码" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
										</div>
									</div>
								</div>

								<!-- 第二个板块: 万维平台(W2)邮箱验证码设置 -->
								<div>
									<div class="flex items-center justify-between mb-3">
										<div class="flex items-center">
											<i class="fas fa-server text-blue-500 mr-2"></i>
											<h3 class="font-medium text-gray-700">万维平台(W2)邮箱验证码设置</h3>
										</div>
										<div class="flex space-x-2">
											<button id="w2_email_api_test_account_setting_button" class="px-3.5 py-1.5 rounded-lg bg-blue-500 text-white hover:bg-blue-600 transition flex items-center text-sm">
												<i class="fas fa-play mr-1.5 text-xs"></i>测试API连通性
											</button>
										</div>
									</div>
									<div class="space-y-4">
										<div>
											<label for="w2_email_api_id_account_setting_input" class="block text-sm text-gray-600 mb-1">通讯ID</label>
											<input type="text" id="w2_email_api_id_account_setting_input" placeholder="输入邮箱API的通讯ID" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
										</div>
										
										<div>
											<label for="w2_email_api_secret_account_setting_input" class="block text-sm text-gray-600 mb-1">通讯密钥</label>
											<input type="text" id="w2_email_api_secret_account_setting_input" placeholder="输入邮箱API的通讯密钥" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
										</div>
										
										<div>
											<label for="w2_email_api_address_account_setting_input" class="block text-sm text-gray-600 mb-1">邮箱地址</label>
											<input type="text" id="w2_email_api_address_account_setting_input" placeholder="输入万维邮箱地址" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
										</div>
										
										<div>
											<label for="w2_email_api_pop3_auth_code_account_setting_input" class="block text-sm text-gray-600 mb-1">POP3授权码</label>
											<input type="text" id="w2_email_api_pop3_auth_code_account_setting_input" placeholder="输入邮箱的POP3授权码" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
										</div>
										<!-- 提示框 -->
										<div id="w2_error_account_setting_message_box" class="hidden bg-red-50 border border-red-200 rounded-lg p-3">
											<div class="flex items-center">
												<i class="fas fa-exclamation-circle text-red-500 mr-2"></i>
												<span class="text-red-700 text-sm">--</span>
											</div>
										</div>
										<div id="w2_info_account_setting_message_box" class="hidden bg-blue-50 border border-blue-200 rounded-lg p-3">
											<div class="flex items-center">
												<i class="fas fa-info-circle text-blue-500 mr-2"></i>
												<span class="text-blue-700 text-sm">--</span>
											</div>
										</div>
									</div>
								</div>
							</div>
							<!-- W2设置分组结束 -->
							<!-- LS设置分组 -->
							<div class="p-5">
							<!-- 第一个板块: 凌波微步(LS)账号设置 -->
								<div class="mb-6">
									<div class="flex items-center justify-between mb-3">
										<div class="flex items-center">
											<i class="fas fa-file-alt text-blue-500 mr-2"></i>
											<h3 class="font-medium text-gray-700">凌波微步(LS)账号设置</h3>
										</div>
										<div class="flex space-x-2">
											<button id="ls_user_test_account_setting_button" class="px-3.5 py-1.5 rounded-lg bg-green-500 text-white hover:bg-green-600 transition flex items-center text-sm">
												<i class="fas fa-play mr-1.5 text-xs"></i>测试LS连通性
											</button>
										</div>
									</div>
									<div class="space-y-4">
										<div>
											<label for="ls_user_name_account_setting_input" class="block text-sm text-gray-600 mb-1">用户名</label>
											<input type="text" id="ls_user_name_account_setting_input" placeholder="dt" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
										</div>
										<div>
											<label for="ls_user_password_account_setting_input" class="block text-sm text-gray-600 mb-1">密码</label>
											<input type="password" id="ls_user_password_account_setting_input" placeholder="输入LS密码" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
										</div>
										<!-- 提示框 -->
										<div id="ls_info_account_setting_message_box" class="hidden bg-blue-50 border border-blue-200 rounded-lg p-3">
											<div class="flex items-center">
												<i class="fas fa-info-circle text-blue-500 mr-2"></i>
												<span class="text-blue-700 text-sm">--</span>
											</div>
										</div>
										<div id="ls_error_account_setting_message_box" class="hidden bg-red-50 border border-red-200 rounded-lg p-3">
											<div class="flex items-center">
												<i class="fas fa-exclamation-circle text-red-500 mr-2"></i>
												<span class="text-red-700 text-sm">--</span>
											</div>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>

				<!-- 右侧: 高级设置 -->
				<div class="space-y-6">
					<div class="bg-white shadow rounded-xl p-5">
						<h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center">
							<i class="fas fa-user mr-2 text-blue-500"></i>模块设置
						</h2>
						<div class="space-y-4">
							<div class="p-5">
							<!-- 第一个板块: 万维平台(W2)模块设置 -->
								<div id="w2_advanced_settings_block" class="mb-6">
									<div class="flex items-center justify-between mb-3">
										<div class="flex items-center">
											<i class="fas fa-server text-blue-500 mr-2"></i>
											<h3 class="font-medium text-gray-700">万维平台(W2)时间区间设置</h3>
										</div>
										<div class="flex space-x-2">
											<button id="w2_time_range_validate_format_module_setting_button" class="px-3.5 py-1.5 rounded-lg bg-yellow-500 text-white hover:bg-yellow-600 transition flex items-center text-sm">
												<i class="fas fa-refresh mr-1.5 text-xs"></i>校验格式
											</button>
										</div>
									</div>
									<div class="space-y-4">
										<div class="flex flex-wrap gap-4 items-start">
											<div class="flex-1 min-w-[280px] max-w-[500px]">
												<label class="block text-sm text-gray-600 mb-1">登录</label>
												<div class="flex gap-2">
													<input type="text" id="w2_time_range_login_start_module_setting_input" placeholder="08:50" class="flex-1 min-w-0 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
													<div class="flex items-center justify-center w-6 text-gray-400 shrink-0">
														<i class="fas fa-right-left text-xs"></i>
													</div>
													<input type="text" id="w2_time_range_login_end_module_setting_input" placeholder="08:50" class="flex-1 min-w-0 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
												</div>
											</div>
											<div class="flex-1 min-w-[280px] max-w-[500px]">
												<label class="block text-sm text-gray-600 mb-1">退出登录</label>
												<div class="flex gap-2">
													<input type="text" id="w2_time_range_login_out_start_module_setting_input" placeholder="18:35" class="flex-1 min-w-0 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
													<div class="flex items-center justify-center w-6 text-gray-400 shrink-0">
														<i class="fas fa-right-left text-xs"></i>
													</div>
													<input type="text" id="w2_time_range_login_out_end_module_setting_input" placeholder="18:35" class="flex-1 min-w-0 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
												</div>
											</div>
										</div>
										<div class="flex flex-wrap gap-4 items-start">
											<div class="flex-1 min-w-[280px] max-w-[500px]">
												<label class="block text-sm text-gray-600 mb-1">上班打卡</label>
												<div class="flex gap-2">
													<input type="text" id="w2_time_range_check_in_start_module_setting_input" placeholder="08:55" class="flex-1 min-w-0 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
													<div class="flex items-center justify-center w-6 text-gray-400 shrink-0">
														<i class="fas fa-right-left text-xs"></i>
													</div>
													<input type="text" id="w2_time_range_check_in_end_module_setting_input" placeholder="08:55" class="flex-1 min-w-0 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
												</div>
											</div>
											<div class="flex-1 min-w-[280px] max-w-[500px]">
												<label class="block text-sm text-gray-600 mb-1">下班打卡</label>
												<div class="flex gap-2">
													<input type="text" id="w2_time_range_check_out_start_module_setting_input" placeholder="18:30" class="flex-1 min-w-0 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
													<div class="flex items-center justify-center w-6 text-gray-400 shrink-0">
														<i class="fas fa-right-left text-xs"></i>
													</div>
													<input type="text" id="w2_time_range_check_out_end_module_setting_input" placeholder="18:30" class="flex-1 min-w-0 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
												</div>
											</div>
										</div>
										<div class="flex flex-wrap gap-4 items-start">
											<div class="flex-1 min-w-[280px] max-w-[500px]">
												<label class="block text-sm text-gray-600 mb-1">前往用餐</label>
												<div class="flex gap-2">
													<input type="text" id="w2_time_range_meal_start_module_setting_input" placeholder="12:00" class="flex-1 min-w-0 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
													<div class="flex items-center justify-center w-6 text-gray-400 shrink-0">
														<i class="fas fa-right-left text-xs"></i>
													</div>
													<input type="text" id="w2_time_range_meal_end_module_setting_input" placeholder="12:00" class="flex-1 min-w-0 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
												</div>
											</div>
											<div class="flex-1 min-w-[280px] max-w-[500px]">
												<label class="block text-sm text-gray-600 mb-1">切换标注</label>
												<div class="flex gap-2">
													<input type="text" id="w2_time_range_working_start_module_setting_input" placeholder="13:30" class="flex-1 min-w-0 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
													<div class="flex items-center justify-center w-6 text-gray-400 shrink-0">
														<i class="fas fa-right-left text-xs"></i>
													</div>
													<input type="text" id="w2_time_range_working_end_module_setting_input" placeholder="13:30" class="flex-1 min-w-0 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
												</div>
											</div>
										</div>
										<!-- 错误提示 -->
										<div id="w2_error_setting_message_box" class="hidden bg-red-50 border border-red-200 rounded-lg p-3">
											<div class="flex items-center">
												<i class="fas fa-exclamation-circle text-red-500 mr-2"></i>
												<span class="text-red-700 text-sm">--</span>
											</div>
										</div>
										<div id="w2_info_setting_message_box" class="hidden bg-blue-50 border border-blue-200 rounded-lg p-3">
											<div class="flex items-center">
												<i class="fas fa-info-circle text-blue-500 mr-2"></i>
												<span class="text-blue-700 text-sm">--</span>
											</div>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>
					
				</div>
			</div>
		</main>
	</div>
</body>
</html>
