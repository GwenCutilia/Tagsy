<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tagsy 仪表盘</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">
	<div id="app" class="flex min-h-screen">
		<!-- 侧边栏 -->
		<aside id="sidebar" class="sidebar fixed top-0 left-0 h-full w-64 bg-white shadow border-r z-40 flex flex-col">
			<div id="sidebar_header" class="text-center text-xl font-bold text-gray-800 py-5 border-b">Tagsy_V2.0.0</div>
			<ul id="sidebar_menu" class="flex flex-col mt-4 space-y-1 px-2">
				<li>
					<a id="menu_overview" href="Index.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-100 text-gray-700">
						<i class="fas fa-gauge mr-3 w-5 text-center"></i>概览
					</a>
				</li>
				<li>
					<a id="menu_w2" href="W2.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-100 text-blue-600 font-semibold bg-blue-100">
						<i class="fas fa-server mr-3 w-5 text-center"></i>万维平台
					</a>
				</li>
				<li id="menu_qlabel">
					<a id="link_qlabel" href="QLabel.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-100 text-gray-700">
						<i class="fas fa-tags mr-3 w-5 text-center"></i>QLabel标注
					</a>
				</li>
				<li id="menu_ls">
					<a id="link_ls" href="LS.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-100 text-gray-700">
						<i class="fas fa-file-alt mr-3 w-5 text-center"></i>凌波微步日报
					</a>
				</li>
				<li id="menu_wecom">
					<a id="link_wecom" href="WeCom.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-100 text-gray-700">
						<i class="fas fa-comments mr-3 w-5 text-center"></i>企业微信日报
					</a>
				</li>
				<li>
					<a id="menu_setting" href="Setting.html" class="flex items-center px-4 py-3 rounded-lg hover:bg-gray-100 text-gray-700">
						<i class="fas fa-cog mr-3 w-5 text-center"></i>设置
					</a>
				</li>
			</ul>
			<div id="sidebar_footer" class="mt-auto px-4 py-4 border-t">
				<a id="logout_btn" href="#" class="flex items-center px-4 py-2 text-sm rounded-md text-red-600 hover:bg-red-50">
					<i class="fas fa-sign-out-alt mr-2 w-5 text-center"></i>退出登录
				</a>
			</div>
		</aside>

		<!-- 主内容区域 -->
		<main class="flex-1 ml-64 p-6 space-y-6">
			<div id="dashboard-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
				<!-- 状态卡片区域 -->
				<div class="grid-cell bg-white shadow rounded-xl p-5 h-24 flex flex-col justify-center" draggable="true">
					<div class="flex items-center justify-between">
						<div class="text-gray-500 text-sm mb-1">当前登录状态</div>
						<div class="flex space-x-2">
							<button id="login_btn" class="ml-auto bg-green-600 text-white w-6 h-6 flex items-center justify-center rounded-md hover:bg-green-700 transition">
								<i class="fa-solid fa-right-to-bracket"></i>
							</button>
							<button id="relogin_btn" class="ml-auto bg-yellow-600 text-white w-6 h-6 flex items-center justify-center rounded-md hover:bg-yellow-700 transition">
								<i class="fa-solid fa-arrows-rotate"></i>
							</button>
							<button id="login_out_btn" class="ml-auto bg-red-600 text-white w-6 h-6 flex items-center justify-center rounded-md hover:bg-red-700 transition">
								<i class="fa-solid fa-right-from-bracket"></i>
							</button>
						</div>
					</div>
					<div id="login_status_label" class="text-2xl font-bold text-blue-600">--</div>
				</div>

				<div class="grid-cell bg-white shadow rounded-xl p-5 h-24 flex flex-col justify-center" draggable="true">
					<div class="flex items-center justify-between">
						<div class="text-gray-500 text-sm mb-1">考勤打卡状态</div>
						<div class="flex space-x-2">
							<button id="check_in_btn" class="ml-auto bg-yellow-500 text-white w-6 h-6 flex items-center justify-center rounded-md hover:bg-yellow-600 transition">
								<i class="fa-solid fa-sun"></i>
							</button>
							<button id="check_out_btn" class="ml-auto bg-blue-500 text-white w-6 h-6 flex items-center justify-center rounded-md hover:bg-blue-600 transition">
								<i class="fa-solid fa-moon"></i>
							</button>
						</div>
					</div>
					<div id="check_in_out_label" class="text-2xl font-bold text-green-600">--</div>
				</div>
				
				<div class="grid-cell bg-white shadow rounded-xl p-5 h-24 flex flex-col justify-center" draggable="true">
					<div class="flex items-center justify-between">
						<div class="text-gray-500 text-sm mb-1">当前工作状态</div>
						<div class="flex space-x-2">
							<button id="meal_working_status_btn" class="ml-auto bg-green-600 text-white w-6 h-6 flex items-center justify-center rounded-md hover:bg-green-700 transition">
								<i class="fa-solid fa-exchange"></i>
							</button>
						</div>
					</div>
					<div id="meal_working_status_label" class="text-2xl font-bold text-blue-600">--</div>
				</div>

				<!-- 当前任务时间线 -->
				<div class="grid-cell bg-white shadow rounded-xl p-5 flex flex-col space-y-4 h-[160px]" draggable="true">
					<div class="flex items-center justify-between">
						<div class="flex items-center">
							<div class="text-gray-500 text-sm align-middle">当前任务时间线</div>
							<div class="text-amber-500 text-s ml-2 align-middle">
								<!-- <i class="fa-solid fa-lightbulb"></i> -->
								<i id="current_time_line_task_turn_on_off_i" class="fa-regular fa-lightbulb"></i>
							</div>
						</div>
						<div class="flex space-x-2">
							<button id="current_time_line_task_start_btn" class="ml-auto bg-green-600 text-white w-6 h-6 flex items-center justify-center rounded-md hover:bg-green-700 transition">
								<i class="fa-solid fa-play"></i>
							</button>
							<button id="current_time_line_task_stop_btn" class="ml-auto bg-red-600 text-white w-6 h-6 flex items-center justify-center rounded-md hover:bg-red-700 transition">
								<i class="fa-solid fa-stop"></i>
							</button>
						</div>
					</div>
					<div class="flex-1 flex items-center justify-between relative">
						<div class="absolute top-10 left-4 right-4 h-0.5 bg-gray-300 z-0"></div>

						<div class="flex flex-col items-center relative z-10">
							<div id="current_time_line_task_icon_0" class="w-4 h-4 bg-blue-600 rounded-full"></div>
							<div id="current_time_line_task_arrow_0" class="mt-1 w-0 h-0 border-l-[4px] border-l-transparent border-r-[4px] border-r-transparent border-b-[6px] border-b-blue-600"></div>
							<div id="current_time_line_task_label_0" class="mt-2 text-gray-700 text-sm">上班打卡</div>
						</div>

						<div class="flex flex-col items-center relative z-10">
							<div id="current_time_line_task_icon_1" class="w-4 h-4 bg-blue-600 rounded-full"></div>
							<div id="current_time_line_task_arrow_1" class="mt-1 w-0 h-0 border-l-[4px] border-l-transparent border-r-[4px] border-r-transparent border-b-[6px] border-b-blue-600"></div>
							<div id="current_time_line_task_label_1" class="mt-2 text-gray-700 text-sm">前往用餐</div>
						</div>

						<div class="flex flex-col items-center relative z-10">
							<div id="current_time_line_task_icon_2" class="w-4 h-4 bg-blue-600 rounded-full"></div>
							<div id="current_time_line_task_arrow_2" class="mt-1 w-0 h-0 border-l-[4px] border-l-transparent border-r-[4px] border-r-transparent border-b-[6px] border-b-blue-600"></div>
							<div id="current_time_line_task_label_2" class="mt-2 text-gray-700 text-sm">切换标注</div>
						</div>

						<div class="flex flex-col items-center relative z-10">
							<div id="current_time_line_task_icon_3" class="w-4 h-4 bg-blue-600 rounded-full"></div>
							<div id="current_time_line_task_arrow_3" class="mt-1 w-0 h-0 border-l-[4px] border-l-transparent border-r-[4px] border-r-transparent border-b-[6px] border-b-blue-600"></div>
							<div id="current_time_line_task_label_3" class="mt-2 text-gray-700 text-sm">下班打卡</div>
						</div>
					</div>
				</div>
				
				<!-- 日历 -->
				<div class="grid-cell bg-white shadow rounded-xl p-6 w-full" draggable="true">
					<div class="text-gray-500 text-sm mb-2">我的排班</div>
					<!-- 月份标题和导航按钮 -->
					<div class="flex justify-between items-center mb-4">
						<div id="calendar_label" class="text-gray-800 font-bold text-xl">--</div>
						<div class="flex space-x-2">
							<button id="prev_month_btn" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition">
								<i class="fas fa-chevron-left text-gray-600"></i>
							</button>
							<button id="next_month_btn" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition">
								<i class="fas fa-chevron-right text-gray-600"></i>
							</button>
						</div>
					</div>
					
					<!-- 星期几标题 -->
					<div class="grid grid-cols-7 text-center text-sm font-medium text-gray-600 mb-2">
						<div class="py-2">日</div>
						<div class="py-2">一</div>
						<div class="py-2">二</div>
						<div class="py-2">三</div>
						<div class="py-2">四</div>
						<div class="py-2">五</div>
						<div class="py-2">六</div>
					</div>

					<!-- 日期网格 -->
					<div id="calendar_table" class="grid grid-cols-7 text-center text-sm gap-1">
						<!-- 动态生成的日期 -->
					</div>
				</div>
			</div>
			<!-- 工具提示容器 -->
			<!-- <div id="tooltip" class="fixed z-50 bg-white text-gray-900 text-sm rounded-md px-3 py-2 shadow border border-gray-200 max-w-xs pointer-events-none transition-all duration-200 opacity-0 invisible"></div> -->
		</main>
	</div>

</body>
</html>
